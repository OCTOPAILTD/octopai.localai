---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: K8S_APP_NAME
  namespace: K8S_APP_NAME
  labels:
    app: K8S_APP_NAME
spec:
  selector:
    matchLabels:
      app: K8S_APP_NAME
  replicas: K8S_REPLICAS
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0        # Don't kill old pods until new ones are ready
      maxSurge: 1              # Only create 1 new pod at a time
  template:
    metadata:
      labels:
        app: K8S_APP_NAME
        application: localai
        enviorment: K8S_APP_ENVIORMENT
        location: K8S_APP_LOCATION
    spec:
      terminationGracePeriodSeconds: 60   # Give pods 60s to shutdown gracefully

      # Pin to localai node pool only
      nodeSelector:
        localai_allowed: "yes"
      tolerations:
        - key: "localai_dedicated"
          operator: "Equal"
          value: "yes"
          effect: "NoSchedule"

      containers:
        - name: K8S_APP_NAME
          image: ACR_IMG_URL
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "28Gi"
              cpu: "4"
            limits:
              memory: "50Gi"
              cpu: "14"
              # nvidia.com/gpu: "1"   # TODO: uncomment when GPU node pool is active

          # Liveness: restarts container if LocalAI is unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: controls when pod receives traffic
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Lifecycle hook: graceful connection draining
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      imagePullSecrets:
        - name: acr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: K8S_APP_NAME
  namespace: K8S_APP_NAME
  annotations:
    # Internal Load Balancer — not exposed to internet
    # OUM VM reaches this via hub-and-spoke routing (firewall rule port 8080 required)
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-internal-subnet: "cldr-aks-subnet"
spec:
  type: LoadBalancer
  selector:
    app: K8S_APP_NAME
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: K8S_APP_NAME-hpa
  namespace: K8S_APP_NAME
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: K8S_APP_NAME
  minReplicas: 1
  maxReplicas: 1    # Single GPU node — no horizontal scaling until more nodes available
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
